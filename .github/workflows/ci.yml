name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.11"

      - name: Sync dependencies
        run: uv sync --all-extras

      - name: Enforce fix/ coupling rule
        shell: bash
        run: |
          if grep -rq "from stackly\.session" src/stackly/fix; then
            echo "ERROR: fix/ must not import from stackly.session"
            grep -rn "from stackly\.session" src/stackly/fix
            exit 1
          fi

      - name: Lint (ruff)
        run: uv run ruff check src tests

      - name: Format check (ruff)
        run: uv run ruff format --check src tests

      - name: Type check (pyright)
        run: uv run pyright

      - name: Unit tests
        # Integration tests require Windows Debugging Tools — skipped in CI.
        run: uv run pytest -m "not integration"
